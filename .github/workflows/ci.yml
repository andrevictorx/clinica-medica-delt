name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest -q

      - name: Smoke test (cria e popula o banco)
        run: |
          python -c "import sys; sys.path.insert(0,'src'); \
          from clinica.database import create_in_memory; \
          db=create_in_memory(); \
          n=db.conn.execute('SELECT COUNT(*) FROM Consulta').fetchone()[0]; \
          assert n == 17, n; print('OK: banco populado com', n, 'consultas')"
